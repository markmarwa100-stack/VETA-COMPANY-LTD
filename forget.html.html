<!-- forgot.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(to right,#050816,#0b1228);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

.forgot-container{
    width:420px;
    background:rgba(17,24,39,0.95);
    border-radius:20px;
    padding:40px;
    color:white;
    border:1px solid rgba(59,130,246,0.3);
}

h2{
    text-align:center;
    margin-bottom:15px;
    color:#3b82f6;
}

p{
    text-align:center;
    color:#9ca3af;
    margin-bottom:25px;
}

.form-control{
    background:#111827;
    border:1px solid #1e3a8a;
    color:white;
    height:50px;
}

.form-control:focus{
    background:#111827;
    color:white;
    border-color:#3b82f6;
    box-shadow:none;
}

.btn-reset{
    background:#2563eb;
    border:none;
    height:50px;
    font-weight:bold;
    border-radius:10px;
}

.btn-reset:hover{
    background:#1d4ed8;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#60a5fa;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="forgot-container">

    <h2>Forgot Password</h2>

    <p>
        Enter your email address and we’ll send you a password reset link.
    </p>

    <form>

        <div class="mb-4">
            <input type="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <button type="submit" class="btn btn-reset w-100 text-white">
            Send Reset Link
        </button>

    </form>

    <div class="login-link">
        <a href="login.html">Back to Login</a>
    </div>

</div>

</body>
</html>
